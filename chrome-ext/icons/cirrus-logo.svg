<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#161630"/>
    </linearGradient>
    <linearGradient id="wave" x1="20" y1="40" x2="108" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b68ee"/>
    </linearGradient>
    <linearGradient id="cloud" x1="24" y1="30" x2="104" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b68ee" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Cloud silhouette (cirrus = high cloud) -->
  <path d="M36 72 C36 58, 46 48, 58 48 C60 38, 72 32, 82 38 C90 34, 102 40, 102 52 C110 54, 112 66, 104 72 Z"
        fill="url(#cloud)" stroke="url(#wave)" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Audio waveform inside cloud -->
  <g stroke="url(#wave)" stroke-width="3" stroke-linecap="round">
    <line x1="48" y1="58" x2="48" y2="66"/>
    <line x1="56" y1="52" x2="56" y2="70"/>
    <line x1="64" y1="46" x2="64" y2="76"/>
    <line x1="72" y1="50" x2="72" y2="72"/>
    <line x1="80" y1="54" x2="80" y2="68"/>
    <line x1="88" y1="58" x2="88" y2="64"/>
  </g>
  <!-- Subtle restoration sparkle dots -->
  <circle cx="44" cy="56" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="92" cy="52" r="1.5" fill="#7b68ee" opacity="0.6"/>
  <circle cx="68" cy="42" r="1" fill="#00d4ff" opacity="0.4"/>
  <!-- Text -->
  <text x="64" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="4" fill="url(#wave)">CIRRUS</text>
</svg>
