<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#161630"/>
    </linearGradient>
    <linearGradient id="wave" x1="20" y1="40" x2="108" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b68ee"/>
    </linearGradient>
    <linearGradient id="crystal" x1="24" y1="30" x2="104" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b68ee" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Crystal/Monolith shape (phaselith = phase + monolith) -->
  <path d="M64 28 L88 52 L88 78 L64 94 L40 78 L40 52 Z"
        fill="url(#crystal)" stroke="url(#wave)" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Inner facet lines -->
  <line x1="64" y1="28" x2="64" y2="94" stroke="url(#wave)" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="40" y1="52" x2="88" y2="78" stroke="url(#wave)" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="88" y1="52" x2="40" y2="78" stroke="url(#wave)" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Audio waveform inside crystal -->
  <g stroke="url(#wave)" stroke-width="2.5" stroke-linecap="round">
    <line x1="50" y1="60" x2="50" y2="68"/>
    <line x1="56" y1="54" x2="56" y2="72"/>
    <line x1="62" y1="48" x2="62" y2="78"/>
    <line x1="68" y1="52" x2="68" y2="74"/>
    <line x1="74" y1="56" x2="74" y2="70"/>
    <line x1="80" y1="60" x2="80" y2="66"/>
  </g>
  <!-- Phase sparkle dots -->
  <circle cx="46" cy="56" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="84" cy="54" r="1.5" fill="#7b68ee" opacity="0.6"/>
  <circle cx="64" cy="36" r="1.2" fill="#00d4ff" opacity="0.5"/>
  <!-- Text -->
  <text x="64" y="112" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="url(#wave)">PHASELITH</text>
</svg>
